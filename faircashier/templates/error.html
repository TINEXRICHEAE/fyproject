<!-- templates/error.html -->
{% extends 'buyer_seller_base.html' %}

{% block title %}Error - Fair Cashier{% endblock %}

{% block content %}
<div class="w-full max-w-md">
    <!-- Error Display -->
    <div class="text-center mb-8 border-b-2 border-white pb-6">
        <div class="bg-white w-20 h-20 mx-auto mb-6 flex items-center justify-center">
            <span class="material-symbols-outlined text-black font-black text-4xl">error</span>
        </div>
        <h1 class="text-3xl font-black uppercase tracking-tighter text-white mb-4">Error</h1>
    </div>

    <!-- Error Message -->
    <div class="border-2 border-white bg-white p-8 text-center mb-6">
        <p class="text-lg font-black uppercase text-black mb-4">
            {{ message|default:"Something went wrong" }}
        </p>
        {% if details %}
        <p class="text-sm font-bold text-black/70">
            {{ details }}
        </p>
        {% endif %}
    </div>

    <!-- Action Button -->
    <a href="/" class="block">
        <button class="w-full bg-primary text-black border-2 border-primary py-4 text-sm font-black uppercase hover:bg-white transition-colors">
            ← Back to Home
        </button>
    </a>
</div>
{% endblock %}
